shellEmulator: true

trustPolicy: no-downgrade

packages:
  - front/apps/*
  - front/packages/*
allowBuilds:
  unrs-resolver: false

overrides:
  vite: "catalog:dev"
  vitest: "catalog:dev"
catalogs:
