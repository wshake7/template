    "@ant-design/cssinjs": latest
    "@ant-design/icons": latest
    "@ant-design/pro-components": ^3.1.12-0
    "@emotion/css": latest
    "@fontsource-variable/geist": latest
    "@preact/signals-react": latest
    "@t3-oss/env-core": latest
    "@tanstack/react-router": latest
    "@tanstack/react-router-devtools": latest
    "@tanstack/react-start": latest
    "@tanstack/react-store": latest
    ahooks: latest
    alova: latest
    antd: ^6
    antd-style: latest
    class-variance-authority: latest
    clsx: latest
    i18next: latest
    i18next-browser-languagedetector: latest
    immer: latest
    js-cookie: latest
    lodash: latest
    lucide-react: latest
    motion: latest
    nprogress: latest
    preact-render-to-string: latest
    react: latest
    react-dom: latest
    react-i18next: latest
    zod: latest
    zustand: latest
  dev:
    "@antfu/eslint-config": ^7
    "@eslint-react/eslint-plugin": ^2
    "@faker-js/faker": latest
    "@playwright/experimental-ct-react": latest
    "@playwright/test": latest
    "@tailwindcss/typography": latest
    "@tailwindcss/vite": latest
