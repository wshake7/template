name: ai-skill-optimizer

on:
  push:
    paths:
      - "backend/**"
      - "front/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ai-skill-optimizer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  optimize-skills:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AI_PROVIDER: deepseek
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-pro' }}
      BASE_SHA: ${{ github.event.before }}
      HEAD_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Optimize skills from backend/front changes
        run: python3 .github/scripts/optimize_skills.py --base "$BASE_SHA" --head "$HEAD_SHA" --provider "$AI_PROVIDER"

      - name: Commit skill updates
        run: |
          if git diff --quiet -- .agents/skills; then
            echo "No skill updates generated."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .agents/skills
          git commit -m "chore(skills): optimize skills from code changes [skip ci]"
          git push
