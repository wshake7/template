name: front-deploy
on:
  push:
    branches: [main, master]
    paths: ["front/**"] # 仅当 front/ 目录下有文件变动时才触发，避免无关改动浪费 runner 时间
  # pull_request:
  #   branches: [main, master]
  workflow_dispatch: # 支持在 GitHub Actions 页面手动触发，方便强制重新部署

permissions:
  contents: read # 读取仓库代码
  pages: write # 写入 GitHub Pages
  id-token: write # 用于 OIDC 身份验证（deploy-pages 需要）

concurrency: # 并发控制
  group: pages # 同一时间只允许一个 pages 组的 workflow 在跑
  cancel-in-progress: false # 表示不取消正在进行的部署，新触发的会排队等待，保证部署完整性（若改为 true 则会打断旧部署，可能导致页面处于中间状态）

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: No tests yet
        run: echo "no tests, skipping"
  front-deploy:
    needs: test          # 测试通过才部署
    if: github.event_name != 'pull_request'  # PR 不部署
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 准备node环境
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      #  安装npm依赖
      - name: Install dependencies
        run: curl -fsSL https://vite.plus | bash

      # 构建
      - name: Build
        run: vp run admin-react#build # ← 补上构建，生成 dist/
        working-directory: . # ← 如果 package.json 在 ./ 下

      # 验证环境
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 上传构建产物
      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: front/dist       # ← 指向你的构建产物目录

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
