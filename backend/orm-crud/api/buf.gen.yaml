# 配置protoc生成规则
version: v1

managed:
  enabled: true
  optimize_for: SPEED

  go_package_prefix:
    default: github.com/tx7do/go-crud/api/gen/go
    except:
      - 'buf.build/googleapis/googleapis'
      - 'buf.build/gnostic/gnostic'

plugins:
  # generate go struct code
  #- plugin: buf.build/protocolbuffers/go
  - name: go
    out: gen/go
    opt: paths=source_relative
