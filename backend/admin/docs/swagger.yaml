        type: array
      fieldMask:
        allOf:
          - $ref: '#/definitions/fieldmaskpb.FieldMask'
        description: 字段掩码，其作用为SELECT中的字段，其语法为使用逗号分隔字段名，例如：id,realName,userName。如果为空则选中所有字段，即SELECT
          *。
      filteringType:
        description: "Types that are valid to be assigned to FilteringType:\n\n\t*PagingRequest_Query\n\t*PagingRequest_Filter\n\t*PagingRequest_FilterExpr"
      limit:
        description: 最多返回的记录数（默认10，建议设置上限如100）
        type: integer
      noPaging:
        description: 是否不分页，如果为true，则page和pageSize参数无效。
        type: boolean
      offset:
        description: 跳过的记录数（从0开始，默认0）
        type: integer
      orderBy:
        description: 排序条件
        type: string
      page:
        description: 当前页码（从1开始，默认1）
        type: integer
      pageSize:
        description: 每页条数（默认10，建议设置上限如100）
        type: integer
      token:
        description: 上一页最后一条记录的游标（如ID/时间戳+ID，首次请求为空）
        type: string
    type: object
  v1.Sorting:
    properties:
      direction:
        allOf:
          - $ref: '#/definitions/v1.Sorting_Direction'
        description: 排序方向
      field:
        description: 排序字段（如"id"、"create_time"）
        type: string
    type: object
  v1.Sorting_Direction:
    enum:
      - 0
      - 1
    format: int32
    type: integer
    x-enum-varnames:
      - Sorting_ASC
      - Sorting_DESC
info:
  contact: {}
  description: |-
    Admin 后端服务 API 文档。
    所有接口均返回 HTTP 200，通过响应体中的 code 区分业务状态：
    | Code | Msg | 说明 |
    | :--- | :--- | :--- |
    | 1 | success | 成功 |
    | 2 | 服务繁忙 | 通用失败 |
    | 3 | 请求超时 | 请求过期 |
    | 4 | 请求重放 | Nonce 校验失败 |
    | 5 | 请求错误 | 客户端请求错误 |
    | 100 | - | 登录/权限相关失败 |
  title: Admin API
  version: "1.0"
paths:
  /api/account/changePwd:
    post:
      consumes:
        - application/json
      description: 修改当前登录用户的密码
      parameters:
        - description: 修改密码请求
          in: body
          name: req
          required: true
          schema:
            $ref: '#/definitions/internal_router_logic.ReqAccountChangePwd'
      produces:
        - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/admin_internal_fiberc_res.Response'
      summary: 修改密码
      tags:
        - Account
  /api/account/login/pwd:
    post:
      consumes:
        - application/json
      description: 通过用户名和密码登录系统，并返回 token 与会话公钥
      parameters:
        - description: 登录请求
          in: body
          name: req
          required: true
          schema:
            $ref: '#/definitions/internal_router_logic.ReqAccountPwdLogin'
      produces:
