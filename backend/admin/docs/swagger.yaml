              - properties:
                  data:
                    $ref: '#/definitions/internal_router_logic.ResAccountPwdLogin'
                type: object
      summary: 用户密码登录
      tags:
        - Account
  /api/account/logout:
    get:
      description: 使当前登录态失效
      parameters:
        - description: 登录 token
          in: header
          name: token
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: 成功
          schema:
